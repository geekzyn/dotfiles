# BEGIN_KITTY_THEME
# Ayu
include current-theme.conf
# END_KITTY_THEME

# ----------------------------------------------------------------
# Appearance
# ----------------------------------------------------------------

font_family      JetBrains Mono
font_size        12.0
cursor_shape     beam
cursor_blink_interval 0
hide_window_decorations titlebar-only
confirm_os_window_close 0

# ----------------------------------------------------------------
# Tab bar
# ----------------------------------------------------------------

tab_bar_edge     bottom
tab_bar_style    separator
tab_bar_min_tabs 1
tab_title_max_length 32
tab_switch_strategy previous

# ----------------------------------------------------------------
# Layouts
#
# splits allows arbitrary pane splitting, stack is used for zoom.
# ----------------------------------------------------------------

enabled_layouts splits,stack

# ----------------------------------------------------------------
# Tabs (tmux windows), behind the ctrl+a leader
# ----------------------------------------------------------------

# create tab
map ctrl+a>c new_tab_with_cwd
# close tab
map ctrl+a>& close_tab
# previous tab
map ctrl+a>p previous_tab
# next tab
map ctrl+a>n next_tab
# rename tab
map ctrl+a>, set_tab_title
# list tabs
map ctrl+a>w select_tab

# ----------------------------------------------------------------
# Panes (tmux panes), behind the ctrl+a leader
# ----------------------------------------------------------------

# vertical split
map ctrl+a>| launch --location=vsplit --cwd=current
# horizontal split
map ctrl+a>- launch --location=hsplit --cwd=current
# zoom current pane (toggle)
map ctrl+a>z toggle_layout stack
# close/kill active pane
map ctrl+a>x close_window
# swap active pane with another one
map ctrl+a>o swap_with_window
# move between split panes
map ctrl+a>h neighboring_window left
map ctrl+a>j neighboring_window down
map ctrl+a>k neighboring_window up
map ctrl+a>l neighboring_window right

# ----------------------------------------------------------------
# Misc
# ----------------------------------------------------------------

# view scrollback (closest to copy mode)
map ctrl+a>[ show_scrollback
