format = """
$directory\
[](fg:#769ff0 bg:#394260)\
($git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
$lua\
$python\
$terraform\
$aws\
$azure\
[](fg:#212736 bg:#1d2230))\
$cmd_duration\
$time\
[ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[python]
symbol = ' '
style = "bg:#212736"
format = '[[ $symbol($virtualenv)](fg:#769ff0 bg:#212736)]($style)'
# format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'
# pyenv_version_name = true

[lua]
symbol = ' '
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[terraform]
# Workspace only: showing $version runs `terraform version` on every prompt
symbol = "󱁢"
style = "bg:#212736"
format = '[[ $symbol $workspace](fg:#769ff0 bg:#212736)]($style)'

[aws]
symbol = "󰸏"
style = "bg:#212736"
format = '[[ $symbol ($profile )($region)(\[$duration\])](fg:#769ff0 bg:#212736)]($style)'
region_aliases = { eu-west-1 = "eu-west-1", eu-central-1 = "eu-central-1", eu-north-1 = "eu-north-1" }
# profile_aliases = { CompanyGroupFrobozzOnCallAccess = "Frobozz" }

[azure]
disabled = false
symbol = "󰠅"
style = "bg:#212736"
format = '[[ $symbol ($subscription)](fg:#769ff0 bg:#212736)]($style)'
# subscription_aliases = { very-long-subscription-name = "vlsn" }

[cmd_duration]
min_time = 2000
style = "bg:#1d2230"
format = '[[ 󰔟 $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'
