format = """
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
($git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
$lua\
$python\
$terraform\
[оӮҙ](fg:#212736 bg:#1d2230))\
$cmd_duration\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[python]
symbol = 'оҲө '
style = "bg:#212736"
format = '[[ $symbol($virtualenv)](fg:#769ff0 bg:#212736)]($style)'
# format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'
# pyenv_version_name = true

[lua]
symbol = 'оҳ  '
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[terraform]
# Workspace only: showing $version runs `terraform version` on every prompt
symbol = "уұҒў"
style = "bg:#212736"
format = '[[ $symbol ](fg:#769ff0 bg:#212736)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#1d2230"
format = '[[ у°”ҹ $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'
